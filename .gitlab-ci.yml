image: alpine:latest

stages:
  - build
  - release

build_addon:
  stage: build
  before_script:
    - apk add --no-cache zip rsync
  script:
    - mkdir -p MethodDungeonTools
    - rsync -av . MethodDungeonTools --exclude .git --exclude .github --exclude .gitlab-ci.yml --exclude MethodDungeonTools --exclude MDT.zip
    - zip -r MDT.zip MethodDungeonTools
  artifacts:
    name: "MDT-Sirus-Latest"
    paths:
      - MDT.zip
    expire_in: never
  only:
    - main

create_release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build_addon
      artifacts: true
  before_script:
    - apk add --no-cache curl
  script:
    - |
      curl --request DELETE --header "JOB-TOKEN: $CI_JOB_TOKEN" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases/latest" || true

      release-cli create --name "Latest Version" \
        --description "Автоматическая сборка для Sirus.su. Коммит: $CI_COMMIT_MESSAGE" \
        --tag-name "latest" \
        --ref "$CI_COMMIT_SHA" \
        --assets-link "{\"name\":\"MDT.zip\",\"url\":\"${CI_PROJECT_URL}/-/jobs/artifacts/main/raw/MDT.zip?job=build_addon\"}"
  only:
    - main
